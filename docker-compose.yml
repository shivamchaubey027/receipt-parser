version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: receipt-parser-app
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - PORT=3001
    volumes:
      - uploads_data:/app/backend/uploads
      - db_data:/app/backend/receipts.db
      - db_data:/app/backend/receipts.db-wal
      - db_data:/app/backend/receipts.db-shm
    restart: unless-stopped

volumes:
  uploads_data:
  db_data:
